services:
  postgres:
    image: postgres:17-alpine
    container_name: unity-flux-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: flux
      POSTGRES_PASSWORD: flux_local_dev
      POSTGRES_DB: unity_flux
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flux -d unity_flux"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
