services:
  postgres:
    image: postgres:17-alpine
    container_name: unity-flux-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: flux
      POSTGRES_PASSWORD: flux_local_dev
      POSTGRES_DB: unity_flux
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flux -d unity_flux"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build:
      context: .
      args:
        VERSION: ${VERSION:-0.0.0}
    container_name: unity-flux-server
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      STORAGE_PROVIDER: postgres
      DATABASE_URL: postgresql://flux:flux_local_dev@postgres:5432/unity_flux
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
